<!DOCTYPE html>
<html lang="{{LANGUAGE}}">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{{COMPANY_NAME}} — Support</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: #0f0f0f;
      color: #e8e8e8;
      height: 100dvh;
      display: flex;
      flex-direction: column;
    }

    /* ── Login screen ── */
    #login-screen {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      height: 100dvh;
      gap: 16px;
    }
    #login-screen h2 { font-size: 1.4rem; color: #fff; }
    #login-screen p  { color: #888; font-size: 0.9rem; }
    #login-screen input {
      width: 280px; padding: 12px 16px;
      background: #1a1a1a; border: 1px solid #333;
      border-radius: 10px; color: #fff; font-size: 1rem;
      outline: none;
    }
    #login-screen input:focus { border-color: #C9A84C; }
    #login-error { color: #e05; font-size: 0.85rem; display: none; }

    /* ── Chat layout ── */
    #chat-screen { display: none; flex-direction: column; height: 100dvh; }

    header {
      padding: 14px 20px;
      background: #161616;
      border-bottom: 1px solid #222;
      display: flex; align-items: center; gap: 10px;
    }
    .avatar {
      width: 36px; height: 36px; border-radius: 50%;
      background: linear-gradient(135deg, #C9A84C, #8B6914);
      display: flex; align-items: center; justify-content: center;
      font-size: 1rem; font-weight: 700; color: #0f0f0f;
    }
    header h1 { font-size: 1rem; font-weight: 600; color: #fff; }
    header p  { font-size: 0.78rem; color: #666; }

    #messages {
      flex: 1; overflow-y: auto; padding: 20px 16px;
      display: flex; flex-direction: column; gap: 12px;
    }
    #messages::-webkit-scrollbar { width: 4px; }
    #messages::-webkit-scrollbar-track { background: transparent; }
    #messages::-webkit-scrollbar-thumb { background: #333; border-radius: 2px; }

    .msg { display: flex; gap: 8px; max-width: 80%; }
    .msg.user { align-self: flex-end; flex-direction: row-reverse; }
    .msg.assistant { align-self: flex-start; }

    .bubble {
      padding: 10px 14px; border-radius: 16px;
      font-size: 0.92rem; line-height: 1.5;
      white-space: pre-wrap; word-break: break-word;
    }
    .msg.user     .bubble { background: #C9A84C; color: #0f0f0f; border-bottom-right-radius: 4px; }
    .msg.assistant .bubble { background: #1e1e1e; color: #e8e8e8; border-bottom-left-radius: 4px; border: 1px solid #2a2a2a; }

    .msg-avatar {
      width: 28px; height: 28px; border-radius: 50%; flex-shrink: 0;
      background: linear-gradient(135deg, #C9A84C, #8B6914);
      display: flex; align-items: center; justify-content: center;
      font-size: 0.75rem; font-weight: 700; color: #0f0f0f;
      margin-top: 2px;
    }

    .typing { display: flex; gap: 4px; padding: 14px; }
    .typing span {
      width: 7px; height: 7px; border-radius: 50%; background: #555;
      animation: bounce 1.2s infinite;
    }
    .typing span:nth-child(2) { animation-delay: 0.2s; }
    .typing span:nth-child(3) { animation-delay: 0.4s; }
    @keyframes bounce { 0%,80%,100% { transform: translateY(0); } 40% { transform: translateY(-6px); } }

    footer {
      padding: 12px 16px;
      background: #161616;
      border-top: 1px solid #222;
    }
    .input-row {
      display: flex; gap: 8px; align-items: flex-end;
      background: #1a1a1a; border: 1px solid #2a2a2a;
      border-radius: 14px; padding: 8px 8px 8px 14px;
      transition: border-color .15s;
    }
    .input-row:focus-within { border-color: #C9A84C44; }
    #input {
      flex: 1; background: none; border: none; outline: none;
      color: #e8e8e8; font-size: 0.95rem; resize: none;
      max-height: 120px; line-height: 1.4;
      font-family: inherit;
    }
    #input::placeholder { color: #555; }
    #send-btn {
      width: 36px; height: 36px; border-radius: 10px; flex-shrink: 0;
      background: #C9A84C; border: none; cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      transition: background .15s, opacity .15s;
    }
    #send-btn:hover { background: #e0b84e; }
    #send-btn:disabled { opacity: .4; cursor: default; }
    #send-btn svg { width: 16px; height: 16px; }

    .btn-gold {
      padding: 11px 28px; border-radius: 10px;
      background: #C9A84C; color: #0f0f0f; border: none;
      font-size: 0.95rem; font-weight: 600; cursor: pointer;
      transition: background .15s;
    }
    .btn-gold:hover { background: #e0b84e; }
  </style>
</head>
<body>

<!-- LOGIN SCREEN -->
<div id="login-screen">
  <div class="avatar" style="width:52px;height:52px;font-size:1.4rem">S</div>
  <h2>{{COMPANY_NAME}}</h2>
  <p>Support-Assistent</p>
  <input type="password" id="pwd-input" placeholder="Passwort eingeben" onkeydown="if(event.key==='Enter')doLogin()">
  <div id="login-error">Falsches Passwort</div>
  <button class="btn-gold" onclick="doLogin()">Anmelden</button>
</div>

<!-- CHAT SCREEN -->
<div id="chat-screen">
  <header>
    <div class="avatar">S</div>
    <div>
      <h1>{{PERSONA_NAME}}</h1>
      <p>{{COMPANY_NAME}} — KI-Support</p>
    </div>
  </header>

  <div id="messages"></div>

  <footer>
    <div class="input-row">
      <textarea id="input" rows="1" placeholder="Ihre Nachricht..." onkeydown="handleKey(event)" oninput="autoResize(this)"></textarea>
      <button id="send-btn" onclick="sendMessage()">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
          <path d="M22 2L11 13M22 2L15 22l-4-9-9-4 20-7z"/>
        </svg>
      </button>
    </div>
  </footer>
</div>

<script>
  const HAS_PASSWORD = {{HAS_PASSWORD}};
  const GREETING = `{{GREETING}}`;
  let history = [];
  let isThinking = false;

  // ── Init ──────────────────────────────────────────────────────────────────
  window.onload = async () => {
    if (!HAS_PASSWORD) {
      showChat();
    } else {
      const res = await fetch('/api/config');
      showLogin();
    }
  };

  function showLogin() {
    document.getElementById('login-screen').style.display = 'flex';
    document.getElementById('chat-screen').style.display = 'none';
    setTimeout(() => document.getElementById('pwd-input').focus(), 100);
  }

  function showChat() {
    document.getElementById('login-screen').style.display = 'none';
    document.getElementById('chat-screen').style.display = 'flex';
    appendMessage('assistant', GREETING);
    setTimeout(() => document.getElementById('input').focus(), 100);
  }

  // ── Auth ──────────────────────────────────────────────────────────────────
  async function doLogin() {
    const pwd = document.getElementById('pwd-input').value;
    const res = await fetch('/api/auth/login', {
      method: 'POST',
      headers: {'Content-Type': 'application/json'},
      body: JSON.stringify({password: pwd})
    });
    if (res.ok) {
      showChat();
    } else {
      document.getElementById('login-error').style.display = 'block';
    }
  }

  // ── Chat ──────────────────────────────────────────────────────────────────
  function appendMessage(role, text) {
    const messages = document.getElementById('messages');
    const wrap = document.createElement('div');
    wrap.className = `msg ${role}`;

    if (role === 'assistant') {
      const av = document.createElement('div');
      av.className = 'msg-avatar';
      av.textContent = 'S';
      wrap.appendChild(av);
    }

    const bubble = document.createElement('div');
    bubble.className = 'bubble';
    bubble.textContent = text;
    wrap.appendChild(bubble);
    messages.appendChild(wrap);
    messages.scrollTop = messages.scrollHeight;
    return bubble;
  }

  function showTyping() {
    const messages = document.getElementById('messages');
    const wrap = document.createElement('div');
    wrap.className = 'msg assistant';
    wrap.id = 'typing-indicator';

    const av = document.createElement('div');
    av.className = 'msg-avatar';
    av.textContent = 'S';
    wrap.appendChild(av);

    const bubble = document.createElement('div');
    bubble.className = 'bubble';
    bubble.innerHTML = '<div class="typing"><span></span><span></span><span></span></div>';
    wrap.appendChild(bubble);
    messages.appendChild(wrap);
    messages.scrollTop = messages.scrollHeight;
  }

  function removeTyping() {
    const t = document.getElementById('typing-indicator');
    if (t) t.remove();
  }

  async function sendMessage() {
    const input = document.getElementById('input');
    const text = input.value.trim();
    if (!text || isThinking) return;

    input.value = '';
    input.style.height = '';
    isThinking = true;
    document.getElementById('send-btn').disabled = true;

    appendMessage('user', text);
    showTyping();

    try {
      const res = await fetch('/api/chat', {
        method: 'POST',
        headers: {'Content-Type': 'application/json'},
        body: JSON.stringify({message: text, history})
      });

      removeTyping();

      if (res.status === 401) {
        showLogin();
        return;
      }

      const data = await res.json();
      appendMessage('assistant', data.response);

      history.push({role: 'user', content: text});
      history.push({role: 'assistant', content: data.response});

      // Keep last 20 turns to avoid bloating
      if (history.length > 40) history = history.slice(-40);

    } catch (err) {
      removeTyping();
      appendMessage('assistant', 'Technischer Fehler. Bitte versuchen Sie es erneut.');
    } finally {
      isThinking = false;
      document.getElementById('send-btn').disabled = false;
      input.focus();
    }
  }

  function handleKey(e) {
    if (e.key === 'Enter' && !e.shiftKey) {
      e.preventDefault();
      sendMessage();
    }
  }

  function autoResize(el) {
    el.style.height = '';
    el.style.height = Math.min(el.scrollHeight, 120) + 'px';
  }
</script>
</body>
</html>
